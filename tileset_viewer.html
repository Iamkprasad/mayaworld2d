<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: monospace;
      padding: 20px;
    }
    .tileset-grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 10px;
    }
    .tile-card {
      background-color: #222222;
      border: 1px solid #444444;
      border-radius: 4px;
      padding: 5px;
      text-align: center;
    }
    .tile-img {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto 5px auto;
    }
    .tile-index {
      font-weight: bold;
      color: #ffcc00;
    }
    .tile-coords {
      font-size: 10px;
      color: #888888;
    }
  </style>
</head>
<body>
  <h1>MayaWorld Tileset Viewer</h1>
  <div class="tileset-grid" id="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    const cols = 114;
    // We will generate cards for tiles 1 to 2000 first (or more)
    // To be efficient, we can load backgrounds_vibrant.png and crop using canvas in JS!
    const img = new Image();
    img.src = 'assets/images/sprites.png';
    img.onload = () => {
      for (let idx = 1; idx <= 3000; idx++) {
        const col = (idx - 1) % cols;
        const row = Math.floor((idx - 1) / cols);
        
        const srcX = col * 17;
        const srcY = row * 17;
        
        // Create canvas to crop tile
        const canvas = document.createElement('canvas');
        canvas.width = 16;
        canvas.height = 16;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, srcX, srcY, 16, 16, 0, 0, 16, 16);
        
        // Create card
        const card = document.createElement('div');
        card.className = 'tile-card';
        
        const tileImg = document.createElement('img');
        tileImg.className = 'tile-img';
        tileImg.src = canvas.toDataURL();
        
        const indexEl = document.createElement('div');
        indexEl.className = 'tile-index';
        indexEl.innerText = idx;
        
        const coordsEl = document.createElement('div');
        coordsEl.className = 'tile-coords';
        coordsEl.innerText = `c=${col}, r=${row}`;
        
        card.appendChild(tileImg);
        card.appendChild(indexEl);
        card.appendChild(coordsEl);
        grid.appendChild(card);
      }
    };
  </script>
</body>
</html>
